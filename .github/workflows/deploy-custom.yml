name: Deploy to Custom Server (Optional)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run validation checks
        run: npm run validate

      - name: Prepare deployment files
        run: |
          mkdir -p dist
          cp -r index.html style.css assets/ locales/ src/ dist/
          echo "✓ Deployment files prepared"

      - name: Deploy via SFTP (configure your server details)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "Add your SFTP/SSH deployment script here"
          echo "Or use a third-party action like appleboy/ssh-action"

      - name: Notify deployment
        if: success()
        run: echo "✓ Deployment to ${{ inputs.environment }} completed successfully"
