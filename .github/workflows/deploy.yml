name: Deploy to InfinityFree

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate code
        run: npm run lint

      - name: Verify required files exist
        run: |
          echo "Checking for required files..."
          test -f index.html && echo "✓ index.html found" || { echo "✗ index.html missing"; exit 1; }
          test -f style.css && echo "✓ style.css found" || { echo "✗ style.css missing"; exit 1; }
          echo "✓ All required files verified"

      - name: List files to be deployed
        run: |
          echo "Files that will be uploaded:"
          find . -maxdepth 1 -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) -o -type d \( -name "assets" -o -name "locales" \)
          echo ""
          echo "Directory structure:"
          ls -la

      - name: Upload to InfinityFree (directly to /htdocs/)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /htdocs/
          dangerous-clean-slate: false
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            .git/
            .github/
            node_modules/
            .abacusai/
            .env
            .env.local
            .ftpignore
            .gitignore
            package.json
            package-lock.json
            *.md
            bin/
            obj/

      - name: Deployment Success
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Your site should be available at: https://${{ secrets.FTP_HOST }}/"
          echo "Direct file at: https://${{ secrets.FTP_HOST }}/index.html"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo ""
          echo "Troubleshooting steps:"
          echo "1. Check FTP credentials in GitHub Secrets"
          echo "2. Verify server directory structure using FTP client"
          echo "3. Check file permissions (should be 644 for files, 755 for directories)"
          echo "4. Ensure /htdocs/ directory exists and is writable"
