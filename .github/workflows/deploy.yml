name: Deploy to InfinityFree

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate code
        run: npm run lint

      - name: Verify required files exist
        run: |
          echo "Checking for required files..."
          test -f index.html && echo "✓ index.html found" || { echo "✗ index.html missing"; exit 1; }
          test -f style.css && echo "✓ style.css found" || { echo "✗ style.css missing"; exit 1; }
          echo "✓ All required files verified"

      - name: Build deployment package (only production files)
        run: |
          echo "Creating optimized deployment package..."
          mkdir -p deploy
          
          # Copy only necessary production files
          cp index.html deploy/
          cp style.css deploy/
          
          # Copy asset directories if they exist
          if [ -d "assets" ]; then
            cp -r assets deploy/
            echo "✓ Copied assets/"
          fi
          
          if [ -d "locales" ]; then
            cp -r locales deploy/
            echo "✓ Copied locales/"
          fi
          
          echo ""
          echo "Deployment package contents:"
          find deploy/ -type f | wc -l
          echo "files ready for upload"
          echo ""
          echo "Package structure:"
          tree -L 2 deploy/ || find deploy/ -type d | head -10

      - name: Upload to InfinityFree (/htdocs/)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: /htdocs/
          dangerous-clean-slate: false
          state-name: .ftp-deploy-sync-state.json

      - name: Deployment Success
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Site deployed to: https://behindthedoor.is-best.net/"
          echo ""
          echo "Deployed files:"
          find deploy/ -type f

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo ""
          echo "Troubleshooting:"
          echo "1. Verify /htdocs/ directory exists on your InfinityFree account"
          echo "2. Check FTP credentials"
          echo "3. Ensure file permissions are correct"
          exit 1

