name: Deploy to InfinityFree

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate code
        run: npm run lint

      - name: Verify required files exist
        run: |
          echo "Checking for required files..."
          test -f index.html && echo "✓ index.html found" || { echo "✗ index.html missing"; exit 1; }
          test -f style.css && echo "✓ style.css found" || { echo "✗ style.css missing"; exit 1; }
          echo "✓ All required files verified"

      - name: List files to be deployed
        run: |
          echo "Files that will be uploaded to /htdocs/:"
          find . -maxdepth 1 -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \)
          echo ""
          echo "Directories to be uploaded:"
          ls -d */ | grep -v node_modules | grep -v .github || true

      - name: Upload to InfinityFree (/htdocs/)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /htdocs/
          dangerous-clean-slate: false
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            .git/
            .github/
            node_modules/
            .abacusai/
            .env
            .env.local
            .ftpignore
            .gitignore
            package.json
            package-lock.json
            *.md
            bin/
            obj/

      - name: Deployment Success
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Site deployed to: https://behindthedoor.is-best.net/"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo ""
          echo "Troubleshooting:"
          echo "1. Verify /htdocs/ directory exists on your InfinityFree account"
          echo "2. Check FTP credentials (FTP_HOST, FTP_USERNAME, FTP_PASSWORD)"
          echo "3. Ensure file permissions are correct"
          exit 1

