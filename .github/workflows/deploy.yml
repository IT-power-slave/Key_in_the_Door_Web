name: Deploy to InfinityFree

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate code
        run: npm run lint

      - name: Verify required files exist
        run: |
          echo "Checking for required files..."
          test -f index.html && echo "✓ index.html found" || { echo "✗ index.html missing"; exit 1; }
          test -f style.css && echo "✓ style.css found" || { echo "✗ style.css missing"; exit 1; }
          echo "✓ All required files verified"

      - name: Check secrets
        run: |
          if [ -z "${{ secrets.FTP_HOST }}" ]; then
            echo "❌ FTP_HOST not configured"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
            echo "❌ FTP_USERNAME not configured"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            echo "❌ FTP_PASSWORD not configured"
            exit 1
          fi
          echo "✓ All FTP secrets are configured"

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp style.css deploy/
          cp -r assets deploy/ 2>/dev/null || true
          cp -r locales deploy/ 2>/dev/null || true
          echo "✓ Deployment package ready"
          echo "Files to be deployed:"
          find deploy/ -type f | head -20

      - name: Upload to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: /htdocs/
          dangerous-clean-slate: false
          state-name: .ftp-deploy-sync-state.json

      - name: Deployment Success
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Your site should be available at: https://${{ secrets.FTP_HOST }}/index.html"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "1. Verify FTP credentials in GitHub Secrets:"
          echo "   - FTP_HOST"
          echo "   - FTP_USERNAME"
          echo "   - FTP_PASSWORD"
          echo "2. Check if the FTP server is reachable"
          echo "3. Ensure /htdocs/ directory exists on the server"
